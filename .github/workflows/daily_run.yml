name: Ulsan Business Alarm
 
on:
  schedule:
    # KST 기준 평일(월~금) 오전 8시 30분 발송
    # UTC = KST - 9시간 → 08:30 KST = 23:30 UTC (전날)
    - cron: '30 23 * * 0-4'   # UTC 일~목 23:30 = KST 월~금 08:30
  workflow_dispatch:            # 수동 실행 버튼
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
 
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
 
      - name: Install libraries
        run: |
          pip install requests beautifulsoup4 lxml selenium
 
      - name: Run script
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_PW: ${{ secrets.NAVER_PW }}
        run: python ulsan_all.py
