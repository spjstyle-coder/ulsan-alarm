name: Ulsan Business Alarm

on:
  schedule:
    - cron: '0 0 * * *' # 한국 시간 오전 9시
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 최신 버전으로 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5 # 여기서 파이썬을 설치해야 합니다 (중요!)
        with:
          python-version: '3.9'

      - name: Install libraries
        run: |
          pip install requests beautifulsoup4

      - name: Run script
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_PW: ${{ secrets.NAVER_PW }}
        run: python ulsan_all.py
